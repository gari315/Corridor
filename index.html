<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quoridor</title>
<style>
/* =========================================================
   リセット & CSS変数
   ========================================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #12111a;
  --surface: #1e1d2e;
  --card:    #252438;
  --p1:      #ff4d6d;
  --p1dim:   rgba(255,77,109,0.18);
  --p2:      #00c9a7;
  --p2dim:   rgba(0,201,167,0.18);
  --gold:    #ffb830;
  --golddim: rgba(255,184,48,0.15);
  --text:    #f0eeff;
  --sub:     #8880aa;
  --border:  #332f55;
  --green:   #39e58c;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

/* =========================================================
   #app レイアウト (縦一列)
   ========================================================= */
#app {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  padding: env(safe-area-inset-top, 6px) 8px env(safe-area-inset-bottom, 6px);
  gap: 6px;
  transition: transform 0.55s cubic-bezier(0.4,0,0.2,1),
              opacity   0.2s;
}
#app.rotating { opacity: 0; }
#app.flipped  { transform: rotate(180deg); }

/* =========================================================
   プレイヤーステータスバー (上下共用)
   ========================================================= */
.pbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 12px;
  background: var(--card);
  border: 1.5px solid var(--border);
  flex-shrink: 0;
  min-height: 48px;
  transition: border-color 0.3s, background 0.3s, opacity 0.3s;
}
.pbar.inactive { opacity: 0.4; }
.pbar.active-p1 { border-color: var(--p1); background: var(--p1dim); }
.pbar.active-p2 { border-color: var(--p2); background: var(--p2dim); }

.pbar-icon {
  width: 28px; height: 28px; border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800;
  letter-spacing: 0;
}
.icon-p1 { background: var(--p1); color: #fff; }
.icon-p2 { background: var(--p2); color: #0a1a16; }

.pbar-name {
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.04em;
  flex: 1;
}

/* 残り壁 */
.wall-count {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 700;
  color: var(--sub);
}
.wall-count-num {
  font-size: 17px;
  font-weight: 800;
}
.wc-p1 { color: var(--p1); }
.wc-p2 { color: var(--p2); }

.wall-pips {
  display: flex; flex-wrap: wrap; gap: 2px;
  justify-content: flex-end;
  width: 60px;
}
.pip {
  width: 8px; height: 5px; border-radius: 2px;
  transition: opacity 0.25s;
}
.pip.used { opacity: 0.1; }
.pip-p1 { background: var(--p1); }
.pip-p2 { background: var(--p2); }

/* =========================================================
   盤面ラッパー
   ========================================================= */
#board-wrap {
  flex: 1; min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
canvas {
  display: block;
  border-radius: 8px;
  touch-action: none;
  cursor: pointer;
}

/* =========================================================
   コントロールパネル
   ========================================================= */
#ctrl {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}

/* モードボタン行 */
.mode-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr auto;
  gap: 6px;
}

.mode-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  min-height: 52px;
  padding: 6px 4px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--sub);
  font-family: inherit;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.mode-btn .icon { font-size: 18px; line-height: 1; }
.mode-btn:active { transform: scale(0.93); }
.mode-btn.active {
  border-color: var(--gold);
  background: var(--golddim);
  color: var(--gold);
}
.mode-btn.disabled { opacity: 0.35; pointer-events: none; }

#btn-reset {
  min-height: 52px;
  min-width: 48px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--sub);
  font-size: 20px;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
#btn-reset:active { transform: scale(0.93); }

/* アクションバー: 確認ボタン or ヒント */
#action-bar {
  min-height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: var(--card);
  border: 1.5px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  color: var(--sub);
  padding: 8px 12px;
  transition: all 0.2s;
}
#action-bar.has-selection {
  background: #1a2e1a;
  border-color: var(--green);
  color: var(--green);
}
#action-bar.has-wall-preview {
  background: #241e0a;
  border-color: var(--gold);
  color: var(--gold);
}
#action-bar.invalid-wall {
  background: #2a1018;
  border-color: #ff4444;
  color: #ff6666;
}

.confirm-btn {
  padding: 6px 18px;
  border-radius: 8px;
  border: none;
  font-family: inherit;
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: 0.05em;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s;
}
.confirm-btn:active { transform: scale(0.93); }
.confirm-move { background: var(--green); color: #06120c; }
.confirm-wall { background: var(--gold);  color: #120c00; }
.cancel-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--sub);
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s;
}
.cancel-btn:active { transform: scale(0.93); }

/* =========================================================
   ターン交代オーバーレイ
   ========================================================= */
#overlay {
  position: fixed; inset: 0;
  background: rgba(10,10,20,0.93);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
#overlay.show { opacity: 1; pointer-events: all; }

.ov-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--sub);
}
.ov-icon {
  width: 64px; height: 64px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 900;
}
.ov-icon.p1 { background: var(--p1); color: #fff; }
.ov-icon.p2 { background: var(--p2); color: #0a1a16; }

.ov-player {
  font-size: 26px; font-weight: 800;
  letter-spacing: 0.06em;
}
.ov-player.p1 { color: var(--p1); }
.ov-player.p2 { color: var(--p2); }

.ov-info {
  display: flex; gap: 20px;
  font-size: 13px;
  color: var(--sub);
}
.ov-info span { font-weight: 700; color: var(--text); }

.ov-divider {
  width: 40px; height: 2px;
  background: var(--border);
  border-radius: 2px;
}

.ov-start-btn {
  margin-top: 8px;
  padding: 16px 52px;
  border-radius: 14px;
  border: 2px solid var(--gold);
  background: var(--golddim);
  color: var(--gold);
  font-family: inherit;
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s, background 0.2s;
}
.ov-start-btn:active { transform: scale(0.95); background: rgba(255,184,48,0.3); }

/* 勝利オーバーレイ */
.ov-win-label {
  font-size: 13px;
  letter-spacing: 0.12em;
  color: var(--gold);
  text-transform: uppercase;
}
.ov-trophy { font-size: 56px; }
.ov-replay-btn {
  padding: 15px 48px;
  border-radius: 14px;
  border: 2px solid var(--p1);
  background: var(--p1dim);
  color: var(--p1);
  font-family: inherit;
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 0.08em;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s;
}
.ov-replay-btn:active { transform: scale(0.95); }
</style>
</head>
<body>

<!-- ========== メインUI ========== -->
<div id="app">

  <!-- 上段: 相手プレイヤーのバー (逆向きに表示される) -->
  <div class="pbar inactive" id="bar-top">
    <div class="pbar-icon icon-p2" id="top-icon">2</div>
    <div class="pbar-name" id="top-name">PLAYER 2</div>
    <div class="wall-count">
      <span class="wall-count-num wc-p2" id="top-walls">10</span>
      <span>🧱</span>
    </div>
    <div class="wall-pips" id="top-pips"></div>
  </div>

  <!-- 盤面 Canvas -->
  <div id="board-wrap">
    <canvas id="c"></canvas>
  </div>

  <!-- 下段: 現在プレイヤーのコントロール -->
  <div id="ctrl">

    <!-- アクション確認バー -->
    <div id="action-bar">
      <span id="action-text">移動するマスを選んでください</span>
    </div>

    <!-- モード切替ボタン + リセット -->
    <div class="mode-row">
      <button class="mode-btn active" id="btn-move"  onclick="setMode('move')">
        <span class="icon">🚶</span>移動
      </button>
      <button class="mode-btn" id="btn-hwall" onclick="setMode('hwall')">
        <span class="icon">━</span>横壁
      </button>
      <button class="mode-btn" id="btn-vwall" onclick="setMode('vwall')">
        <span class="icon">┃</span>縦壁
      </button>
      <button id="btn-reset" onclick="confirmReset()" title="リセット">↺</button>
    </div>

  </div>

  <!-- 下段プレイヤーバー (現在プレイヤー) -->
  <div class="pbar active-p1" id="bar-bot">
    <div class="pbar-icon icon-p1" id="bot-icon">1</div>
    <div class="pbar-name" id="bot-name">PLAYER 1</div>
    <div class="wall-count">
      <span class="wall-count-num wc-p1" id="bot-walls">10</span>
      <span>🧱</span>
    </div>
    <div class="wall-pips" id="bot-pips"></div>
  </div>

</div>

<!-- ========== オーバーレイ ========== -->
<div id="overlay"><!-- JS で動的に内容を入れる --></div>

<script>
/* ==========================================================
   定数
   ========================================================== */
const CELLS = 9;

/* ==========================================================
   Canvas サイズ計算
   各UI要素の実測に近い高さを引いて盤面に使える高さを求める
   ========================================================== */
function calcDim() {
  const safeTop = parseInt(
    getComputedStyle(document.documentElement)
      .getPropertyValue('--sat') || '0'
  ) || 0;
  // pbar x2 + action-bar + mode-row + gaps + padding
  const UI_H = 48 + 48 + 44 + 52 + 6*5 + 12 + safeTop;
  const avW  = window.innerWidth  - 16;
  const avH  = window.innerHeight - UI_H;
  const maxPx = Math.max(100, Math.min(avW, avH));

  const MARGIN = 16;
  const GAP    = 7;
  const unit   = Math.floor((maxPx - MARGIN * 2 + GAP) / CELLS);
  const CELL   = Math.max(18, unit - GAP);
  const SIZE   = MARGIN * 2 + CELLS * (CELL + GAP) - GAP;
  return { CELL, GAP, MARGIN, UNIT: CELL + GAP, SIZE };
}

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let DIM = calcDim();

function resizeCanvas() {
  DIM = calcDim();
  canvas.width  = DIM.SIZE;
  canvas.height = DIM.SIZE;
}
resizeCanvas();

/* ==========================================================
   アニメーション状態
   ========================================================== */
const anim = {
  active:  false,
  piece:   0,          // 動かす駒インデックス
  fromR: 0, fromC: 0,
  toR:   0, toC:   0,
  t:     0,            // 0→1 進捗
  dur:   160,          // ms
  start: 0,
  onDone: null
};

function startAnim(piece, fromR, fromC, toR, toC, onDone) {
  anim.active = true;
  anim.piece  = piece;
  anim.fromR  = fromR; anim.fromC = fromC;
  anim.toR    = toR;   anim.toC   = toC;
  anim.t      = 0;
  anim.start  = performance.now();
  anim.onDone = onDone;
  requestAnimationFrame(animFrame);
}

function animFrame(now) {
  anim.t = Math.min(1, (now - anim.start) / anim.dur);
  draw();
  if (anim.t < 1) {
    requestAnimationFrame(animFrame);
  } else {
    anim.active = false;
    if (anim.onDone) anim.onDone();
  }
}

// easeOutCubic
function ease(t) { return 1 - Math.pow(1 - t, 3); }

/* ==========================================================
   ゲーム状態
   ========================================================== */
let state;

function initState() {
  return {
    pos:       [[8, 4], [0, 4]],  // [row,col]  P1:下端中央, P2:上端中央
    walls:     { h: new Set(), v: new Set() },
    wallsLeft: [10, 10],
    turn:      0,         // 0=P1, 1=P2
    mode:      'move',    // 'move' | 'hwall' | 'vwall'
    over:      false,
    winner:    -1,
    // 確認ステップ用
    selMove:   null,      // 選択中の移動先 [r,c] or null
    selWall:   null,      // 選択中の壁 {type,r,c} or null
    hoverWall: null       // ホバー/ドラッグ中のプレビュー位置
  };
}
state = initState();

/* ==========================================================
   BFS: 経路チェック
   ========================================================== */
function canReach(pos, walls, pi) {
  const goal = pi === 0 ? 0 : 8;
  const vis  = Array.from({length: CELLS}, () => new Array(CELLS).fill(false));
  const q    = [[...pos[pi]]];
  vis[pos[pi][0]][pos[pi][1]] = true;
  while (q.length) {
    const [r, c] = q.shift();
    if (r === goal) return true;
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = r+dr, nc = c+dc;
      if (nr<0||nr>=CELLS||nc<0||nc>=CELLS||vis[nr][nc]) continue;
      if (isBlocked(r,c,nr,nc,walls)) continue;
      vis[nr][nc] = true; q.push([nr,nc]);
    }
  }
  return false;
}

/* ==========================================================
   壁ブロック判定
   ========================================================== */
function isBlocked(r, c, nr, nc, walls) {
  const {h, v} = walls;
  if (nr===r-1) return h.has(`${r-1},${c}`)  || h.has(`${r-1},${c-1}`);
  if (nr===r+1) return h.has(`${r},${c}`)    || h.has(`${r},${c-1}`);
  if (nc===c-1) return v.has(`${r},${c-1}`)  || v.has(`${r-1},${c-1}`);
  if (nc===c+1) return v.has(`${r},${c}`)    || v.has(`${r-1},${c}`);
  return false;
}

/* ==========================================================
   移動可能マス列挙
   ========================================================== */
function getMoves(pi, pos, walls) {
  const [r, c] = pos[pi];
  const oth    = pos[1-pi];
  const moves  = [];
  for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
    const nr = r+dr, nc = c+dc;
    if (nr<0||nr>=CELLS||nc<0||nc>=CELLS) continue;
    if (isBlocked(r,c,nr,nc,walls)) continue;
    if (nr===oth[0] && nc===oth[1]) {
      // ジャンプ
      const jr=nr+dr, jc=nc+dc;
      if (jr>=0&&jr<CELLS&&jc>=0&&jc<CELLS&&!isBlocked(nr,nc,jr,jc,walls)) {
        moves.push([jr,jc]);
      } else {
        for (const [sr,sc] of (dr!==0?[[0,-1],[0,1]]:[[-1,0],[1,0]])) {
          const or2=nr+sr, oc2=nc+sc;
          if (or2>=0&&or2<CELLS&&oc2>=0&&oc2<CELLS&&!isBlocked(nr,nc,or2,oc2,walls))
            moves.push([or2,oc2]);
        }
      }
    } else {
      moves.push([nr,nc]);
    }
  }
  return moves;
}

/* ==========================================================
   壁設置チェック
   ========================================================== */
function canPlaceWall(type, r, c, s) {
  if (s.wallsLeft[s.turn] <= 0) return false;
  const nh = new Set(s.walls.h), nv = new Set(s.walls.v);
  if (type === 'h') {
    if (r<0||r>=CELLS-1||c<0||c>=CELLS-1) return false;
    const k = `${r},${c}`;
    if (nh.has(k)||nh.has(`${r},${c-1}`)||nh.has(`${r},${c+1}`)) return false;
    if (nv.has(k)) return false;
    nh.add(k);
  } else {
    if (r<0||r>=CELLS-1||c<0||c>=CELLS-1) return false;
    const k = `${r},${c}`;
    if (nv.has(k)||nv.has(`${r-1},${c}`)||nv.has(`${r+1},${c}`)) return false;
    if (nh.has(k)) return false;
    nv.add(k);
  }
  return canReach(s.pos, {h:nh,v:nv}, 0) && canReach(s.pos, {h:nh,v:nv}, 1);
}

/* ==========================================================
   座標ヘルパー
   ========================================================== */
function cellXY(r, c) {
  return { x: DIM.MARGIN + c*DIM.UNIT, y: DIM.MARGIN + r*DIM.UNIT };
}
function hWallRect(r, c) {
  const {x,y} = cellXY(r,c);
  return { x, y: y+DIM.CELL, w: DIM.CELL*2+DIM.GAP, h: DIM.GAP };
}
function vWallRect(r, c) {
  const {x,y} = cellXY(r,c);
  return { x: x+DIM.CELL, y, w: DIM.GAP, h: DIM.CELL*2+DIM.GAP };
}

/* ==========================================================
   描画
   ========================================================== */
function draw() {
  const {CELL, GAP, MARGIN, UNIT, SIZE} = DIM;
  ctx.clearRect(0, 0, SIZE, SIZE);

  // 背景
  ctx.fillStyle = '#0d0c18';
  ctx.fillRect(0, 0, SIZE, SIZE);

  // 移動可能マスのセット
  const moves   = state.over ? [] : getMoves(state.turn, state.pos, state.walls);
  const moveSet = new Set(moves.map(([r,c])=>`${r},${c}`));

  /* --- セル --- */
  for (let r = 0; r < CELLS; r++) {
    for (let c = 0; c < CELLS; c++) {
      const {x,y} = cellXY(r,c);
      const key   = `${r},${c}`;
      const isMov = moveSet.has(key);
      const isSel = state.selMove && state.selMove[0]===r && state.selMove[1]===c;

      // ベース色
      let fill = '#1a1832';
      if (r === 0) fill = '#0d1e30';
      if (r === 8) fill = '#200d1e';

      ctx.fillStyle = fill;
      ctx.beginPath(); ctx.roundRect(x,y,CELL,CELL,3); ctx.fill();

      // ゴール帯
      if (r===0) { ctx.fillStyle='rgba(0,201,167,0.10)'; ctx.fillRect(x,y,CELL,CELL); }
      if (r===8) { ctx.fillStyle='rgba(255,77,109,0.10)'; ctx.fillRect(x,y,CELL,CELL); }

      // 移動可能ハイライト
      if (isMov && state.mode==='move') {
        ctx.fillStyle = 'rgba(57,229,140,0.18)';
        ctx.beginPath(); ctx.roundRect(x,y,CELL,CELL,3); ctx.fill();
        // ドット
        ctx.fillStyle = isSel ? 'rgba(57,229,140,1)' : 'rgba(57,229,140,0.7)';
        const dotR = Math.max(4, CELL*0.17);
        ctx.beginPath(); ctx.arc(x+CELL/2,y+CELL/2,dotR,0,Math.PI*2); ctx.fill();
      }

      // 選択済みマスのリング
      if (isSel) {
        ctx.strokeStyle = '#39e58c';
        ctx.lineWidth   = 2;
        ctx.beginPath(); ctx.roundRect(x+1,y+1,CELL-2,CELL-2,3); ctx.stroke();
      }
    }
  }

  /* --- 設置済み壁 --- */
  ctx.fillStyle = '#ffb830';
  for (const key of state.walls.h) {
    const [r,c] = key.split(',').map(Number);
    const p = hWallRect(r,c);
    ctx.beginPath(); ctx.roundRect(p.x,p.y,p.w,p.h,2); ctx.fill();
  }
  for (const key of state.walls.v) {
    const [r,c] = key.split(',').map(Number);
    const p = vWallRect(r,c);
    ctx.beginPath(); ctx.roundRect(p.x,p.y,p.w,p.h,2); ctx.fill();
  }

  /* --- 壁プレビュー (ホバー) --- */
  if (state.hoverWall && state.mode !== 'move') {
    const {type,r,c,valid} = state.hoverWall;
    ctx.fillStyle = valid
      ? 'rgba(255,184,48,0.45)'
      : 'rgba(255,60,60,0.38)';
    const p = type==='h' ? hWallRect(r,c) : vWallRect(r,c);
    ctx.beginPath(); ctx.roundRect(p.x,p.y,p.w,p.h,2); ctx.fill();
  }

  /* --- 壁 確認選択中 --- */
  if (state.selWall) {
    const {type,r,c,valid} = state.selWall;
    if (valid) {
      ctx.fillStyle = 'rgba(255,184,48,0.85)';
    } else {
      ctx.fillStyle = 'rgba(255,60,60,0.7)';
    }
    const p = type==='h' ? hWallRect(r,c) : vWallRect(r,c);
    ctx.beginPath(); ctx.roundRect(p.x,p.y,p.w,p.h,2); ctx.fill();
    // 枠線
    ctx.strokeStyle = valid ? '#ffb830' : '#ff4444';
    ctx.lineWidth   = 2;
    ctx.beginPath(); ctx.roundRect(p.x-1,p.y-1,p.w+2,p.h+2,3); ctx.stroke();
  }

  /* --- 駒 --- */
  const pColors  = ['#ff4d6d','#00c9a7'];
  const pGlows   = ['rgba(255,77,109,0.8)','rgba(0,201,167,0.8)'];
  const pShadows = ['rgba(255,77,109,0.5)','rgba(0,201,167,0.5)'];

  for (let p = 0; p < 2; p++) {
    let drawR, drawC;

    if (anim.active && anim.piece === p) {
      // アニメーション中: 補間位置
      const et = ease(anim.t);
      drawR = anim.fromR + (anim.toR - anim.fromR) * et;
      drawC = anim.fromC + (anim.toC - anim.fromC) * et;
    } else {
      [drawR, drawC] = state.pos[p];
    }

    const cx = MARGIN + drawC*UNIT + CELL/2;
    const cy = MARGIN + drawR*UNIT + CELL/2;
    const rad = CELL/2 - Math.max(2, CELL*0.08);

    // グロー
    ctx.shadowColor = pGlows[p];
    ctx.shadowBlur  = p === state.turn ? 18 : 8;
    ctx.fillStyle   = pColors[p];
    ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur  = 0;

    // アクティブリング
    if (p === state.turn && !state.over) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth   = 2;
      ctx.beginPath(); ctx.arc(cx,cy,rad+3,0,Math.PI*2); ctx.stroke();
    }

    // ハイライト
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.beginPath();
    ctx.arc(cx - rad*0.22, cy - rad*0.28, rad*0.28, 0, Math.PI*2);
    ctx.fill();

    // 番号
    ctx.fillStyle   = p===0 ? '#fff' : '#062018';
    ctx.font        = `bold ${Math.max(9,Math.floor(rad*0.9))}px -apple-system,sans-serif`;
    ctx.textAlign   = 'center';
    ctx.textBaseline= 'middle';
    ctx.fillText(p+1, cx, cy+1);
    ctx.textBaseline= 'alphabetic';
  }

  /* --- ゴールラベル --- */
  const fs = Math.max(8, Math.floor(CELL*0.18));
  ctx.font      = `700 ${fs}px -apple-system,sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,201,167,0.55)';
  ctx.fillText('P2  G O A L', SIZE/2, MARGIN - 4);
  ctx.fillStyle = 'rgba(255,77,109,0.55)';
  ctx.fillText('P1  G O A L', SIZE/2, SIZE - 3);
}

/* ==========================================================
   UI更新
   ========================================================== */
function updateUI() {
  const cur = state.turn, opp = 1-cur;
  const names   = ['PLAYER 1','PLAYER 2'];
  const icons   = ['1','2'];
  const iconCls = ['icon-p1','icon-p2'];
  const barCls  = ['active-p1','active-p2'];
  const pipCls  = ['pip-p1','pip-p2'];
  const wcCls   = ['wc-p1','wc-p2'];

  // 下バー: 現在プレイヤー
  const bot = document.getElementById('bar-bot');
  bot.className = `pbar ${barCls[cur]}`;
  document.getElementById('bot-icon').className   = `pbar-icon ${iconCls[cur]}`;
  document.getElementById('bot-icon').textContent = icons[cur];
  document.getElementById('bot-name').textContent = names[cur];
  document.getElementById('bot-walls').className  = `wall-count-num ${wcCls[cur]}`;
  document.getElementById('bot-walls').textContent= state.wallsLeft[cur];
  renderPips('bot-pips', state.wallsLeft[cur], pipCls[cur]);

  // 上バー: 相手プレイヤー
  const top = document.getElementById('bar-top');
  top.className = 'pbar inactive';
  document.getElementById('top-icon').className   = `pbar-icon ${iconCls[opp]}`;
  document.getElementById('top-icon').textContent = icons[opp];
  document.getElementById('top-name').textContent = names[opp];
  document.getElementById('top-walls').className  = `wall-count-num ${wcCls[opp]}`;
  document.getElementById('top-walls').textContent= state.wallsLeft[opp];
  renderPips('top-pips', state.wallsLeft[opp], pipCls[opp]);

  // モードボタン
  ['move','hwall','vwall'].forEach(m => {
    const btn = document.getElementById(`btn-${m}`);
    btn.classList.toggle('active', state.mode === m);
    // 壁残り0なら壁ボタンを無効化
    const isWallBtn = m==='hwall'||m==='vwall';
    btn.classList.toggle('disabled', isWallBtn && state.wallsLeft[cur] <= 0);
  });

  updateActionBar();
}

function renderPips(id, left, cls) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('div');
    d.className = `pip ${cls}` + (i >= left ? ' used' : '');
    el.appendChild(d);
  }
}

function updateActionBar() {
  const bar  = document.getElementById('action-bar');
  const text = document.getElementById('action-text');

  if (state.over) {
    bar.className = 'has-selection';
    bar.innerHTML = `<span style="color:var(--gold);font-weight:800;">🎉 PLAYER ${state.winner+1} の勝利！</span>`;
    return;
  }

  // 移動先を選択中
  if (state.selMove) {
    bar.className = 'action-bar has-selection';
    const [r,c] = state.selMove;
    bar.innerHTML = `
      <span>${r+1}行${c+1}列へ移動しますか？</span>
      <button class="confirm-btn confirm-move" onclick="confirmMove()">確定</button>
      <button class="cancel-btn" onclick="cancelSel()">×</button>
    `;
    return;
  }

  // 壁を選択中
  if (state.selWall) {
    if (state.selWall.valid) {
      bar.className = 'action-bar has-wall-preview';
      const {type,r,c} = state.selWall;
      const label = type==='h' ? '横壁' : '縦壁';
      bar.innerHTML = `
        <span>${label}を設置しますか？</span>
        <button class="confirm-btn confirm-wall" onclick="confirmWall()">確定</button>
        <button class="cancel-btn" onclick="cancelSel()">×</button>
      `;
    } else {
      bar.className = 'action-bar invalid-wall';
      bar.innerHTML = `<span>⛔ そこには置けません</span>
        <button class="cancel-btn" onclick="cancelSel()">×</button>`;
    }
    return;
  }

  // 通常状態
  bar.className = 'action-bar';
  if (state.mode === 'move') {
    text.textContent = '移動先をタップしてください';
    bar.innerHTML = `<span id="action-text">移動先をタップしてください</span>`;
  } else {
    const wl = state.wallsLeft[state.turn];
    const label = state.mode==='hwall' ? '横壁' : '縦壁';
    bar.innerHTML = `<span id="action-text">${label}の位置をタップ (残り${wl}枚)</span>`;
  }
}

/* ==========================================================
   モード切替
   ========================================================== */
function setMode(mode) {
  if (state.over) return;
  state.mode     = mode;
  state.selMove  = null;
  state.selWall  = null;
  state.hoverWall= null;
  draw();
  updateUI();
}

/* ==========================================================
   確認ステップ: 移動
   ========================================================== */
function selectMove(r, c) {
  state.selMove = [r, c];
  draw();
  updateUI();
}

function confirmMove() {
  if (!state.selMove) return;
  const [r, c]   = state.selMove;
  const [fr, fc] = state.pos[state.turn];
  const pi       = state.turn;

  state.selMove = null;

  // アニメーション → 完了後にstate更新
  startAnim(pi, fr, fc, r, c, () => {
    state.pos[pi] = [r, c];

    if ((pi===0 && r===0)||(pi===1 && r===8)) {
      state.winner = pi;
      state.over   = true;
      draw();
      showWinOverlay();
      return;
    }
    nextTurn();
  });
}

function cancelSel() {
  state.selMove  = null;
  state.selWall  = null;
  state.hoverWall= null;
  draw();
  updateUI();
}

/* ==========================================================
   確認ステップ: 壁
   ========================================================== */
function selectWall(type, r, c) {
  const valid = canPlaceWall(type, r, c, state);
  state.selWall  = {type, r, c, valid};
  state.hoverWall= null;
  draw();
  updateUI();
}

function confirmWall() {
  if (!state.selWall || !state.selWall.valid) return;
  const {type, r, c} = state.selWall;
  state.walls[type].add(`${r},${c}`);
  state.wallsLeft[state.turn]--;
  state.selWall   = null;
  state.hoverWall = null;
  nextTurn();
}

/* ==========================================================
   ターン交代
   ========================================================== */
function nextTurn() {
  state.turn     = 1 - state.turn;
  state.mode     = 'move';
  state.selMove  = null;
  state.selWall  = null;
  state.hoverWall= null;
  draw();
  showTurnOverlay();
}

/* ==========================================================
   オーバーレイ表示
   ========================================================== */
function showTurnOverlay() {
  const t     = state.turn;
  const names = ['PLAYER 1','PLAYER 2'];
  const cls   = ['p1','p2'];
  const wl    = state.wallsLeft[t];
  const ov    = document.getElementById('overlay');

  ov.innerHTML = `
    <div class="ov-label">次のターン</div>
    <div class="ov-icon ${cls[t]}">${t+1}</div>
    <div class="ov-player ${cls[t]}">${names[t]}</div>
    <div class="ov-divider"></div>
    <div class="ov-info">
      <div>残り壁 <span>${wl}枚</span></div>
    </div>
    <button class="ov-start-btn" onclick="dismissTurnOverlay()">タップして開始</button>
  `;
  ov.classList.add('show');
}

function dismissTurnOverlay() {
  const ov = document.getElementById('overlay');
  ov.classList.remove('show');

  // 少し待ってから回転適用 (フェードアウト後)
  const app = document.getElementById('app');
  app.classList.add('rotating');
  setTimeout(() => {
    app.classList.toggle('flipped', state.turn === 1);
    app.classList.remove('rotating');
    updateUI();
    draw();
  }, 80);
}

function showWinOverlay() {
  const t   = state.winner;
  const cls = ['p1','p2'];
  const ov  = document.getElementById('overlay');
  ov.innerHTML = `
    <div class="ov-win-label">🏆 WINNER</div>
    <div class="ov-trophy">🎉</div>
    <div class="ov-player ${cls[t]}">PLAYER ${t+1}</div>
    <div class="ov-divider"></div>
    <button class="ov-replay-btn" style="border-color:var(--${cls[t]});color:var(--${cls[t]});background:var(--${cls[t]}dim);" onclick="resetGame()">もう一度プレイ</button>
  `;
  ov.classList.add('show');
}

/* ==========================================================
   リセット確認
   ========================================================== */
function confirmReset() {
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <div class="ov-label">ゲームをリセットしますか？</div>
    <div style="display:flex;gap:12px;margin-top:8px;">
      <button class="ov-start-btn" style="padding:14px 32px;" onclick="resetGame()">はい</button>
      <button class="cancel-btn" style="padding:14px 32px;font-size:15px;" onclick="document.getElementById('overlay').classList.remove('show')">いいえ</button>
    </div>
  `;
  ov.classList.add('show');
}

function resetGame() {
  state = initState();
  document.getElementById('overlay').classList.remove('show');
  const app = document.getElementById('app');
  app.classList.remove('flipped','rotating');
  draw();
  updateUI();
}

/* ==========================================================
   Canvas座標変換 (CSS rotate(180deg) 対応)
   ========================================================== */
function getCanvasPos(clientX, clientY) {
  const rect   = canvas.getBoundingClientRect();
  const relX   = clientX - rect.left;
  const relY   = clientY - rect.top;
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  if (document.getElementById('app').classList.contains('flipped')) {
    return {
      px: (rect.width  - relX) * scaleX,
      py: (rect.height - relY) * scaleY
    };
  }
  return { px: relX * scaleX, py: relY * scaleY };
}

/* ==========================================================
   セル / 壁位置特定
   ========================================================== */
function hitCell(px, py) {
  const col = Math.floor((px - DIM.MARGIN) / DIM.UNIT);
  const row = Math.floor((py - DIM.MARGIN) / DIM.UNIT);
  if (row<0||row>=CELLS||col<0||col>=CELLS) return null;
  return [row, col];
}

function hitWall(px, py, type) {
  const {MARGIN, UNIT, CELL} = DIM;
  if (type === 'h') {
    const r = Math.round((py - MARGIN - CELL) / UNIT);
    const c = Math.floor((px - MARGIN) / UNIT);
    return [r, c];
  } else {
    const r = Math.floor((py - MARGIN) / UNIT);
    const c = Math.round((px - MARGIN - CELL) / UNIT);
    return [r, c];
  }
}

/* ==========================================================
   タップ処理 (2ステップ確認)
   ========================================================== */
function handleTap(clientX, clientY) {
  if (state.over || anim.active) return;
  const {px, py} = getCanvasPos(clientX, clientY);

  if (state.mode === 'move') {
    const cell = hitCell(px, py);
    if (!cell) { cancelSel(); return; }
    const [r, c] = cell;
    const moveSet = new Set(getMoves(state.turn, state.pos, state.walls).map(([mr,mc])=>`${mr},${mc}`));

    // 同じマスをもう一度タップ → 確定
    if (state.selMove && state.selMove[0]===r && state.selMove[1]===c) {
      confirmMove(); return;
    }
    // 移動可能マスをタップ → 選択
    if (moveSet.has(`${r},${c}`)) {
      selectMove(r, c); return;
    }
    cancelSel();

  } else {
    // 壁モード
    const type   = state.mode === 'hwall' ? 'h' : 'v';
    const [r, c] = hitWall(px, py, type);

    // 同じ位置をもう一度タップかつ有効 → 確定
    if (state.selWall && state.selWall.r===r && state.selWall.c===c
        && state.selWall.type===type && state.selWall.valid) {
      confirmWall(); return;
    }
    selectWall(type, r, c);
  }
}

canvas.addEventListener('click', e => handleTap(e.clientX, e.clientY));

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  handleTap(t.clientX, t.clientY);
}, {passive: false});

/* ==========================================================
   ホバー / ドラッグ: 壁プレビュー
   ========================================================== */
function handleMove(clientX, clientY) {
  if (state.over || anim.active || state.mode === 'move') {
    if (state.hoverWall) { state.hoverWall = null; draw(); }
    return;
  }
  const {px, py} = getCanvasPos(clientX, clientY);
  const type     = state.mode === 'hwall' ? 'h' : 'v';
  const [r, c]   = hitWall(px, py, type);
  const valid    = canPlaceWall(type, r, c, state);

  // 既に選択済みの壁がある場合はホバーを使わない
  if (state.selWall) return;

  state.hoverWall = {type, r, c, valid};
  draw();
}

canvas.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
canvas.addEventListener('mouseleave', () => { state.hoverWall=null; draw(); });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  handleMove(t.clientX, t.clientY);
}, {passive: false});

/* ==========================================================
   リサイズ
   ========================================================== */
window.addEventListener('resize', () => {
  resizeCanvas(); draw();
});

/* ==========================================================
   初期表示
   ========================================================== */
resizeCanvas();
draw();
updateUI();
</script>
</body>
</html>
